<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNHS Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f6fb; padding: 24px 16px; }
  .container { max-width: 800px; margin: 0 auto; }
  .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #dde2ee; }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #1a6fdb; }
  .upload-zone { border: 2px dashed #bcd4f7; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; background: #e8f1fc; margin-bottom: 20px; }
  .upload-zone:hover { background: #ddeeff; }
  .preview-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 16px 0; }
  .preview-table th, .preview-table td { padding: 8px; border-bottom: 1px solid #dde2ee; text-align: left; }
  .teacher-check { display: flex; align-items: center; gap: 10px; padding: 10px; background: #f4f6fb; border-radius: 8px; margin: 8px 0; }
  .btn { padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: #1a6fdb; color: white; }
  .btn-primary:hover { background: #1258b8; }
  .progress-item { padding: 10px; margin: 5px 0; border-radius: 8px; }
  .progress-item.success { background: #edfaf3; color: #1a9e5c; }
  .progress-item.error { background: #fff0f0; color: #d93a3a; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1e2a; color: white; padding: 10px 20px; border-radius: 10px; display: none; }
  .toast.show { display: block; }
</style>
</head>
<body>

<div class="container">
  <h1>BNHS Admin Portal</h1>
  <p style="color: #5a6175; margin-bottom: 20px;">Import students from SF1 to your sheets</p>

  <!-- Upload Section -->
  <div class="card">
    <div class="card-title">📁 Step 1: Upload SF1 File</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      📂 Click or drag SF1 Excel file here
    </div>
    <input type="file" id="fileInput" accept=".xls,.xlsx" style="display:none">
    <div id="previewArea" style="display:none">
      <h3>Students Found:</h3>
      <table class="preview-table" id="previewTable">
        <thead><tr><th>LRN</th><th>Last Name</th><th>First Name</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Teacher Selection -->
  <div class="card" id="teacherCard" style="display:none">
    <div class="card-title">👩‍🏫 Step 2: Select Teachers</div>
    <div id="teacherList"></div>
    <div style="margin-top: 16px;">
      <label>Section:</label>
      <input type="text" id="sectionName" placeholder="e.g., Grade 7-Sampaguita" style="width:100%; padding:8px; margin-top:8px; border:1px solid #dde2ee; border-radius:8px;">
    </div>
    <button class="btn btn-primary" id="importBtn" style="margin-top: 20px; width:100%">📥 Import to Selected Sheets</button>
  </div>

  <!-- Progress -->
  <div id="progressArea" style="display:none">
    <div class="card">
      <div class="card-title">📊 Import Progress</div>
      <div id="progressList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ Done!</div>

<script>
// ========== CONFIG ==========
const CENTRAL_API = "https://script.google.com/macros/s/AKfycbxhlUgCZ-tg3tVq1i3SDVS9msEDCh80epni1N8ER98fzI7lsIS4Axw2Ldq1iF3x7quUEg/exec";

let currentStudents = [];
let currentTeachers = [];

// ========== TEACHER LIST (Edit this to match your teachers) ==========
const TEACHERS = [
  { id: "t1", name: "Teacher 1 - Basigsig", sheetId: "1eTJWdfjOIEf2ytIKmHk5feBKa1Qk8PXlzpjfI1eSBTU", subjects: ["Math-Grade7-Sampaguita", "Science-Grade7-Sampaguita", "English-Grade7-Apple"] },
  { id: "t2", name: "Teacher 2 - Rabuya", sheetId: "1_7xH4MQBMvutKoataA8M6mw4OYlxSGbFRcOTRTkXrIE", subjects: ["Filipino-Grade7-Sampaguita", "AP-Grade7-Sampaguita", "EsP-Grade7-Sampaguita", "TLE-Grade7-Sampaguita"] }
];

// ========== FILE UPLOAD ==========
document.getElementById('fileInput').addEventListener('change', handleFile);
document.getElementById('uploadZone').addEventListener('dragover', e => e.preventDefault());
document.getElementById('uploadZone').addEventListener('drop', e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xls','xlsx'].includes(ext)) {
    showToast('Please upload .xls or .xlsx file', 'red');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      
      const students = [];
      for (let i = 0; i < rows.length; i++) {
        for (let c = 0; c < Math.min(rows[i].length, 15); c++) {
          const digits = String(rows[i][c]).replace(/\D/g, '');
          if (digits.length === 12) {
            let lastName = '', firstName = '';
            // Look for name in next columns
            for (let off = 1; off <= 3; off++) {
              const next = String(rows[i][c+off] || '').trim();
              if (next && !next.match(/^\d+$/)) {
                if (!lastName) lastName = next;
                else if (!firstName) firstName = next;
                else break;
              }
            }
            students.push({
              lrn: digits,
              lastName: lastName || '—',
              firstName: firstName || '—'
            });
            break;
          }
        }
      }
      
      if (students.length === 0) {
        showToast('No students found with 12-digit LRNs', 'red');
        return;
      }
      
      currentStudents = students;
      showPreview(students);
      showTeacherSelection();
      showToast(`✅ Found ${students.length} students`, 'green');
      
    } catch(err) {
      showToast('Error reading file', 'red');
    }
  };
  reader.readAsArrayBuffer(file);
}

function showPreview(students) {
  document.getElementById('previewArea').style.display = 'block';
  const tbody = document.getElementById('previewBody');
  tbody.innerHTML = students.slice(0, 20).map(s => `
    <tr><td>${s.lrn}</td><td>${s.lastName}</td><td>${s.firstName}</td></tr>
  `).join('');
  if (students.length > 20) {
    tbody.innerHTML += `<tr><td colspan="3">... and ${students.length - 20} more</td></tr>`;
  }
}

function showTeacherSelection() {
  document.getElementById('teacherCard').style.display = 'block';
  const listDiv = document.getElementById('teacherList');
  listDiv.innerHTML = TEACHERS.map(t => `
    <label class="teacher-check">
      <input type="checkbox" value="${t.id}" class="teacher-cb" checked>
      <strong>${t.name}</strong><br>
      <small style="color:#9099ae">${t.subjects.join(', ')}</small>
    </label>
  `).join('');
}

// ========== IMPORT ==========
document.getElementById('importBtn').addEventListener('click', async function() {
  const selectedTeachers = [];
  document.querySelectorAll('.teacher-cb:checked').forEach(cb => {
    const teacher = TEACHERS.find(t => t.id === cb.value);
    if (teacher) selectedTeachers.push(teacher);
  });
  
  const section = document.getElementById('sectionName').value.trim();
  if (!section) {
    showToast('Please enter a section name', 'red');
    return;
  }
  
  if (selectedTeachers.length === 0) {
    showToast('Please select at least one teacher', 'red');
    return;
  }
  
  // Prepare data for API
  const teacherSheets = [];
  for (let teacher of selectedTeachers) {
    for (let tabName of teacher.subjects) {
      teacherSheets.push({
        sheetId: teacher.sheetId,
        tabName: tabName
      });
    }
  }
  
  const studentsData = currentStudents.map(s => ({
    lrn: s.lrn,
    lastName: s.lastName,
    firstName: s.firstName
  }));
  
  // Show progress
  document.getElementById('progressArea').style.display = 'block';
  document.getElementById('progressList').innerHTML = '<p>⏳ Sending data to server...</p>';
  document.getElementById('importBtn').disabled = true;
  
  try {
    const response = await fetch(CENTRAL_API, {
      method: 'POST',
      body: JSON.stringify({
        action: 'importStudents',
        students: studentsData,
        section: section,
        teacherSheets: teacherSheets
      })
    });
    
    const result = await response.json();
    
    if (result.success) {
      let html = '';
      for (let r of result.results) {
        const icon = r.success ? '✅' : '❌';
        html += `<div class="progress-item ${r.success ? 'success' : 'error'}">
          ${icon} ${r.target}: ${r.success ? `${r.added || 0} students added` : r.error}
        </div>`;
      }
      document.getElementById('progressList').innerHTML = html;
      showToast('Import complete!', 'green');
    } else {
      document.getElementById('progressList').innerHTML = `<div class="progress-item error">❌ Error: ${result.error || 'Unknown error'}</div>`;
      showToast('Import failed', 'red');
    }
  } catch (err) {
    document.getElementById('progressList').innerHTML = `<div class="progress-item error">❌ Connection error: ${err.message}</div>`;
    showToast('Connection error', 'red');
  } finally {
    document.getElementById('importBtn').disabled = false;
  }
});

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = type === 'green' ? '#1a9e5c' : '#d93a3a';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>

</body>
</html>
