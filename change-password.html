<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — Baganga NHS</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #1a56db;
      --blue-dark:  #1341b0;
      --blue-light: #e8f0fe;
      --green:      #16a34a;
      --green-light:#dcfce7;
      --red:        #dc2626;
      --gray-50:    #f8fafc;
      --gray-100:   #f1f5f9;
      --gray-200:   #e2e8f0;
      --gray-400:   #94a3b8;
      --gray-500:   #64748b;
      --gray-600:   #475569;
      --gray-900:   #0f172a;
      --white:      #ffffff;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(0,0,0,0.10);
      --nav-h:      64px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--gray-50);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at center, #dbeafe 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── FORCED MODE: full-screen centered card (no nav) ── */
    /* ── VOLUNTARY MODE: top-aligned with bottom nav ── */

    body.voluntary {
      justify-content: flex-start;
      padding-top: 0;
      padding-bottom: calc(var(--nav-h) + 16px);
    }

    /* ── TOP HEADER (voluntary mode only) ── */
    .top-header {
      display: none;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
    }

    body.voluntary .top-header { display: block; }

    .header-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 4px 0;
    }

    .back-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-900);
    }

    /* ── CARD ── */
    .card-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
    }

    body.voluntary .card-wrap {
      margin: 24px auto 0;
      padding: 0 16px;
    }

    /* Forced mode banner */
    .forced-banner {
      background: var(--blue-light);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 16px 20px;
      border: 1px solid #bfdbfe;
      border-bottom: none;
    }

    body.voluntary .forced-banner { display: none; }

    .forced-banner-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 2px;
    }

    .forced-banner-sub {
      font-size: 12px;
      color: var(--blue);
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px 28px;
      animation: fadeUp 0.4s ease both;
    }

    body:not(.voluntary) .card {
      border-radius: 0 0 var(--radius) var(--radius);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Voluntary mode: brand shown inside card */
    .brand {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-align: center;
    }

    /* brand only shown in forced mode (no header) */
    body:not(.voluntary) .brand { display: flex; }

    .brand-icon {
      width: 48px; height: 48px;
      background: var(--blue);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    .brand-icon svg { width: 22px; height: 22px; fill: white; }

    .brand-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--gray-400);
    }

    /* ── FORM ── */
    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 6px;
    }

    .pw-wrap { position: relative; }

    .pw-wrap input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      color: var(--gray-900);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .pw-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
    }

    .pw-wrap input::placeholder { color: var(--gray-400); }

    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--gray-400);
      padding: 4px;
      display: flex; align-items: center;
    }

    .pw-toggle:hover { color: var(--gray-600); }

    /* ── STRENGTH METER ── */
    .strength-wrap {
      margin-top: 8px;
    }

    .strength-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--gray-200);
      transition: background 0.2s;
    }

    .strength-bar.weak   { background: var(--red); }
    .strength-bar.fair   { background: #f59e0b; }
    .strength-bar.good   { background: #3b82f6; }
    .strength-bar.strong { background: var(--green); }

    .strength-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
    }

    .strength-label.weak   { color: var(--red); }
    .strength-label.fair   { color: #f59e0b; }
    .strength-label.good   { color: #3b82f6; }
    .strength-label.strong { color: var(--green); }

    /* ── MATCH HINT ── */
    .match-hint {
      font-size: 12px;
      font-weight: 500;
      margin-top: 6px;
      min-height: 16px;
    }

    .match-hint.ok  { color: var(--green); }
    .match-hint.err { color: var(--red); }

    /* ── REQUIREMENTS LIST ── */
    .req-list {
      margin: 4px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .req-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--gray-400);
      font-weight: 500;
      transition: color 0.2s;
    }

    .req-item.met { color: var(--green); }

    .req-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gray-300);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .req-item.met .req-dot { background: var(--green); }

    /* ── ERROR / SUCCESS MESSAGES ── */
    .msg {
      display: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .msg.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
    }

    .msg.success {
      background: var(--green-light);
      border: 1px solid #bbf7d0;
      color: var(--green);
    }

    .msg.show { display: block; }

    /* ── BUTTON ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
    }

    .btn-submit:hover  { background: var(--blue-dark); }
    .btn-submit:active { transform: scale(0.985); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn-submit.loading .spinner  { display: block; }
    .btn-submit.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BOTTOM NAV (voluntary mode only) ── */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      align-items: center;
      justify-content: space-around;
      z-index: 100;
    }

    body.voluntary .bottom-nav { display: flex; }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 10px;
      transition: background 0.15s;
      color: var(--gray-400);
    }

    .nav-btn.active { color: var(--blue); }
    .nav-btn:hover  { background: var(--gray-100); }

    .nav-btn svg {
      width: 22px; height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- TOP HEADER (voluntary mode) -->
  <header class="top-header">
    <div class="header-inner">
      <button class="back-btn" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <span class="header-title">Change Password</span>
    </div>
  </header>

  <div class="card-wrap">

    <!-- Forced mode banner -->
    <div class="forced-banner">
      <div class="forced-banner-title">🔒 Password Change Required</div>
      <div class="forced-banner-sub">You must set a new password before continuing.</div>
    </div>

    <div class="card">

      <!-- Brand (forced mode only) -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
        </div>
        <span class="brand-title">Set New Password</span>
        <span class="brand-sub">Baganga National High School</span>
      </div>

      <!-- Message area -->
      <div class="msg" id="msgBox"></div>

      <!-- Current password -->
      <div class="field">
        <label for="currentPw">Current Password</label>
        <div class="pw-wrap">
          <input type="password" id="currentPw" placeholder="Enter current password" autocomplete="current-password" />
          <button class="pw-toggle" type="button" data-target="currentPw" aria-label="Toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- New password -->
      <div class="field">
        <label for="newPw">New Password</label>
        <div class="pw-wrap">
          <input type="password" id="newPw" placeholder="At least 8 characters" autocomplete="new-password" />
          <button class="pw-toggle" type="button" data-target="newPw" aria-label="Toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <!-- Strength meter -->
        <div class="strength-wrap" id="strengthWrap" style="display:none;">
          <div class="strength-bars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <!-- Requirements -->
        <div class="req-list">
          <div class="req-item" id="req-len">
            <div class="req-dot"></div> At least 8 characters
          </div>
          <div class="req-item" id="req-num">
            <div class="req-dot"></div> Contains a number
          </div>
          <div class="req-item" id="req-lrn">
            <div class="req-dot"></div> Not the same as your LRN
          </div>
        </div>
      </div>

      <!-- Confirm password -->
      <div class="field">
        <label for="confirmPw">Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPw" placeholder="Re-enter new password" autocomplete="new-password" />
          <button class="pw-toggle" type="button" data-target="confirmPw" aria-label="Toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="match-hint" id="matchHint"></div>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="submitBtn" type="button">
        <span class="btn-text">Update Password</span>
        <div class="spinner"></div>
      </button>

    </div>
  </div>

  <!-- BOTTOM NAV (voluntary mode) -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location.href='dashboard.html'">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Grades</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='profile.html'">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="nav-label">Profile</span>
    </button>
    <button class="nav-btn active">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="nav-label">Password</span>
    </button>
  </nav>

  <script src="config.js"></script>
  <script>
    const API_URL = CENTRAL_API;

    // ── SESSION CHECK ──
    const token = localStorage.getItem("gp_token");
    const lrn   = localStorage.getItem("gp_lrn");
    if (!token || !lrn) window.location.href = "index.html";

    // ── DETECT MODE ──
    const params = new URLSearchParams(window.location.search);
    const isForced = params.get("first") === "true";
    if (!isForced) document.body.classList.add("voluntary");

    // ── ELEMENTS ──
    const currentPw  = document.getElementById("currentPw");
    const newPw      = document.getElementById("newPw");
    const confirmPw  = document.getElementById("confirmPw");
    const submitBtn  = document.getElementById("submitBtn");
    const msgBox     = document.getElementById("msgBox");
    const matchHint  = document.getElementById("matchHint");

    // ── PASSWORD TOGGLES ──
    document.querySelectorAll(".pw-toggle").forEach(btn => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.target);
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        btn.querySelector("svg").innerHTML = isHidden
          ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
          : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      });
    });

    // ── STRENGTH METER ──
    newPw.addEventListener("input", () => {
      const val = newPw.value;
      const wrap = document.getElementById("strengthWrap");
      wrap.style.display = val.length > 0 ? "block" : "none";

      const score = getStrength(val);
      const bars  = [document.getElementById("bar1"), document.getElementById("bar2"),
                     document.getElementById("bar3"), document.getElementById("bar4")];
      const label = document.getElementById("strengthLabel");

      const levels = ["", "weak", "fair", "good", "strong"];
      const texts  = ["", "Weak", "Fair", "Good", "Strong"];

      bars.forEach((bar, i) => {
        bar.className = "strength-bar " + (i < score ? levels[score] : "");
      });
      label.textContent = texts[score];
      label.className   = "strength-label " + levels[score];

      // Requirements
      updateReq("req-len", val.length >= 8);
      updateReq("req-num", /\d/.test(val));
      updateReq("req-lrn", val !== lrn);

      // Re-check confirm match if already typed
      if (confirmPw.value) checkMatch();
    });

    confirmPw.addEventListener("input", checkMatch);

    function getStrength(pw) {
      let score = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[0-9]/.test(pw))  score++;
      if (/[^a-zA-Z0-9]/.test(pw)) score++;
      return Math.min(score, 4);
    }

    function updateReq(id, met) {
      const el = document.getElementById(id);
      el.classList.toggle("met", met);
    }

    function checkMatch() {
      const np = newPw.value;
      const cp = confirmPw.value;
      if (!cp) { matchHint.textContent = ""; return; }
      if (np === cp) {
        matchHint.textContent = "✓ Passwords match";
        matchHint.className = "match-hint ok";
      } else {
        matchHint.textContent = "Passwords do not match";
        matchHint.className = "match-hint err";
      }
    }

    // ── ENTER KEY ──
    [currentPw, newPw, confirmPw].forEach(el => {
      el.addEventListener("keydown", e => { if (e.key === "Enter") handleSubmit(); });
    });

    submitBtn.addEventListener("click", handleSubmit);

    // ── SUBMIT ──
    async function handleSubmit() {
      clearMsg();

      const current = currentPw.value.trim();
      const newPass  = newPw.value.trim();
      const confirm  = confirmPw.value.trim();

      if (!current) { showMsg("Please enter your current password.", "error"); currentPw.focus(); return; }
      if (!newPass)  { showMsg("Please enter a new password.", "error"); newPw.focus(); return; }
      if (newPass.length < 8) { showMsg("New password must be at least 8 characters.", "error"); newPw.focus(); return; }
      if (!/\d/.test(newPass)) { showMsg("New password must contain at least one number.", "error"); newPw.focus(); return; }
      if (newPass === lrn) { showMsg("Your password cannot be the same as your LRN.", "error"); newPw.focus(); return; }
      if (newPass !== confirm) { showMsg("Passwords do not match.", "error"); confirmPw.focus(); return; }

      setLoading(true);

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "changePassword", lrn, token, currentPassword: current, newPassword: newPass })
        });
        const data = await res.json();

        if (!data.success) {
          showMsg(data.message || "Could not update password. Please try again.", "error");
          return;
        }

        showMsg("Password updated successfully! Redirecting…", "success");
        clearForm();

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1800);

      } catch (err) {
        showMsg("Cannot connect to the server. Please check your internet connection.", "error");
      } finally {
        setLoading(false);
      }
    }

    // ── HELPERS ──
    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className = `msg ${type} show`;
      msgBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function clearMsg() {
      msgBox.className = "msg";
      msgBox.textContent = "";
    }

    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.classList.toggle("loading", on);
    }

    function clearForm() {
      currentPw.value = "";
      newPw.value = "";
      confirmPw.value = "";
      matchHint.textContent = "";
      document.getElementById("strengthWrap").style.display = "none";
      ["req-len","req-num","req-lrn"].forEach(id => updateReq(id, false));
    }
  </script>

</body>
</html>
