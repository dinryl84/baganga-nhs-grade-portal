<!DOCTYPE html>
<html lang="en">
<head>
 <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Grades — Baganga NHS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:        #1a6fdb;
    --blue-dark:   #1258b8;
    --blue-light:  #e8f1fc;
    --blue-mid:    #bcd4f7;
    --text:        #1a1e2a;
    --text-sub:    #5a6175;
    --text-hint:   #9099ae;
    --border:      #dde2ee;
    --surface:     #f4f6fb;
    --white:       #ffffff;
    --red:         #d93a3a;
    --red-light:   #fff0f0;
    --red-border:  #f5c0c0;
    --green:       #1a9e5c;
    --green-light: #edfaf3;
    --green-border:#a8e6c8;
    --amber:       #c47d0e;
    --amber-light: #fff8ec;
    --amber-border:#f5d98a;
    --radius:      14px;
    --shadow:      0 2px 16px rgba(26,111,219,0.08), 0 1px 4px rgba(0,0,0,0.05);
    --nav-h:       64px;
  }

  html { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100%;
    padding-bottom: calc(var(--nav-h) + 16px);
  }

  /* ── Top header ── */
  .top-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top-bar-inner {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .school-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .student-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .student-meta {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 1px;
  }

  /* ── Main content ── */
  .main {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 0;
  }

  /* ── Period badge ── */
  .period-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .period-badge.blue   { background: var(--blue-light);   color: var(--blue); }
  .period-badge.amber  { background: var(--amber-light);  color: var(--amber); }
  .period-badge.green  { background: var(--green-light);  color: var(--green); }

  .period-badge::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* ── Quarter tabs ── */
  .quarter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 5px;
  }

  .q-tab {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 8px;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    cursor: pointer;
    transition: background .2s, color .2s;
    text-align: center;
  }

  .q-tab:hover:not(.disabled):not(.active) {
    background: var(--surface);
    color: var(--text);
  }

  .q-tab.active {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 2px 8px rgba(26,111,219,0.25);
  }

  .q-tab.disabled {
    color: var(--text-hint);
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── General average card ── */
  .avg-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  .avg-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
  }

  .avg-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .avg-value.fail { color: var(--red); }
  .avg-value.pass { color: var(--green); }

  .remarks-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .remarks-pill.pass { background: var(--green-light); color: var(--green); border: 1px solid var(--green-border); }
  .remarks-pill.fail { background: var(--red-light);   color: var(--red);   border: 1px solid var(--red-border); }
  .remarks-pill.pending { background: var(--surface); color: var(--text-hint); border: 1px solid var(--border); }

  /* ── Subject cards ── */
  .subject-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .subject-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
    animation: fadeIn .3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .subject-card.has-fail {
    border-left: 3px solid var(--red);
  }

  .subject-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .subject-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .subject-avg {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .subject-avg.fail { color: var(--red); }
  .subject-avg.pass { color: var(--green); }
  .subject-avg.pending { color: var(--text-hint); font-size: 15px; }

  /* Quarter grade pills row */
  .q-grades {
    display: flex;
    gap: 6px;
  }

  .q-grade-item {
    flex: 1;
    background: var(--surface);
    border-radius: 8px;
    padding: 6px 4px;
    text-align: center;
  }

  .q-grade-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }

  .q-grade-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .q-grade-value.fail    { color: var(--red); }
  .q-grade-value.pending { color: var(--text-hint); font-weight: 500; }
  .q-grade-value.current { color: var(--blue); }

  /* Subject remarks pill */
  .subject-remarks {
    margin-top: 10px;
  }

  /* ── Loading state ── */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 14px;
  }

  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--blue-mid);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 14px;
    color: var(--text-sub);
  }

  /* ── Error state ── */
  .error-wrap {
    background: var(--red-light);
    border: 1px solid var(--red-border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    font-size: 14px;
    color: var(--red);
    display: none;
  }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--nav-h);
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    z-index: 200;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    text-decoration: none;
    color: var(--text-hint);
    font-size: 11px;
    font-weight: 600;
    transition: color .2s;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .nav-item svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke .2s;
  }

  .nav-item.active {
    color: var(--blue);
  }

  .nav-item:hover { color: var(--blue); }

  /* ── Skeleton loader ── */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }

  .sk-line { height: 14px; margin-bottom: 8px; }
  .sk-short { width: 40%; }
  .sk-long  { width: 80%; }
  .sk-grades { display: flex; gap: 6px; margin-top: 4px; }
  .sk-grade  { flex: 1; height: 44px; border-radius: 8px; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <div class="top-bar-inner">
    <div>
      <div class="school-label">Baganga NHS — Grade Portal</div>
      <div class="student-name" id="studentName">Loading...</div>
      <div class="student-meta" id="studentMeta"></div>
    </div>
  </div>
</div>

<!-- Main content -->
<div class="main">

  <!-- Period badge -->
  <div class="period-badge blue" id="periodBadge" style="display:none"></div>

  <!-- Quarter tabs -->
  <div class="quarter-tabs" id="quarterTabs">
    <button class="q-tab active" data-q="0">Q1</button>
    <button class="q-tab disabled" data-q="1">Q2</button>
    <button class="q-tab disabled" data-q="2">Q3</button>
    <button class="q-tab disabled" data-q="3">Q4</button>
  </div>

  <!-- General average -->
  <div class="avg-card" id="avgCard" style="display:none">
    <div>
      <div class="avg-label" id="avgLabel">Quarter average</div>
      <div class="avg-value" id="avgValue">—</div>
    </div>
    <div class="remarks-pill pending" id="remarksGlobal">In progress</div>
  </div>

  <!-- Skeleton loaders -->
  <div class="subject-list" id="skeletonList">
    <div class="skeleton-card">
      <div class="sk-line sk-long skeleton"></div>
      <div class="sk-grades"><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div></div>
    </div>
    <div class="skeleton-card">
      <div class="sk-line sk-long skeleton"></div>
      <div class="sk-grades"><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div></div>
    </div>
    <div class="skeleton-card">
      <div class="sk-line sk-long skeleton"></div>
      <div class="sk-grades"><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div><div class="sk-grade skeleton"></div></div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-wrap" id="errorWrap">
    Could not load grades. Please check your connection and refresh the page.
  </div>

  <!-- Subject list -->
  <div class="subject-list" id="subjectList" style="display:none"></div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Grades
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </a>
  <a href="change-password.html" class="nav-item">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Password
  </a>
</nav>

<script src="config.js"></script>
<script>
  // ── Auth check ──────────────────────────────────────────────
  const token   = localStorage.getItem('gp_token');
  const lrn     = localStorage.getItem('gp_lrn');
  const name    = localStorage.getItem('gp_name');
  const section = localStorage.getItem('gp_section');

  if (!token || !lrn) {
    window.location.href = 'index.html';
  }

  // ── Populate header ─────────────────────────────────────────
  document.getElementById('studentName').textContent = name || '—';
  document.getElementById('studentMeta').textContent = (section || '—') + '  ·  LRN: ' + lrn;

  // ── State ───────────────────────────────────────────────────
  let allGrades = [];   // array of { subject, q1, q2, q3, q4, missing }
  let activeQ   = 0;    // 0=Q1, 1=Q2, 2=Q3, 3=Q4
  const PASS    = 75;
  const Q_LABELS = ['1st Quarter', '2nd Quarter', '3rd Quarter', '4th Quarter'];

  // ── Fetch all grades ────────────────────────────────────────
  async function fetchAllGrades() {
    const subjects = SECTIONS[section];

    if (!subjects || subjects.length === 0) {
      showError('No subjects found for your section (' + section + '). Please contact your class adviser.');
      return;
    }

    try {
      const results = await Promise.all(
        subjects.map(async (s) => {
          try {
            const url = `${s.url}?action=getGrades&lrn=${encodeURIComponent(lrn)}&tab=${encodeURIComponent(s.tab)}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.success) {
              return {
                subject: s.subject,
                q1: data.q1,
                q2: data.q2,
                q3: data.q3,
                q4: data.q4,
                missing: false
              };
            } else {
              return { subject: s.subject, q1: null, q2: null, q3: null, q4: null, missing: true };
            }
          } catch {
            return { subject: s.subject, q1: null, q2: null, q3: null, q4: null, missing: true };
          }
        })
      );

      allGrades = results;
      hideSkeleton();
      detectCurrentQuarter();
      renderAll();

    } catch (err) {
      showError();
    }
  }

  // ── Detect which quarter is current ─────────────────────────
  // Current quarter = highest quarter index that has at least one grade encoded
  function detectCurrentQuarter() {
    let current = 0;
    for (let g of allGrades) {
      if (g.q4 !== null) { current = 3; break; }
      if (g.q3 !== null) current = Math.max(current, 2);
      else if (g.q2 !== null) current = Math.max(current, 1);
      else if (g.q1 !== null) current = Math.max(current, 0);
    }
    activeQ = current;
    updateTabs(current);
  }

  // ── Update tab states ────────────────────────────────────────
  function updateTabs(currentQ) {
    const tabs = document.querySelectorAll('.q-tab');
    tabs.forEach((tab, i) => {
      tab.classList.remove('active', 'disabled');
      if (i > currentQ) {
        tab.classList.add('disabled');
      } else if (i === activeQ) {
        tab.classList.add('active');
      }
    });
  }

  // ── Quarter tab click ────────────────────────────────────────
  document.getElementById('quarterTabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.q-tab');
    if (!tab || tab.classList.contains('disabled')) return;
    activeQ = parseInt(tab.dataset.q);
    document.querySelectorAll('.q-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderAll();
  });

  // ── Render everything ────────────────────────────────────────
  function renderAll() {
    renderPeriodBadge();
    renderAvgCard();
    renderSubjects();
  }

  // ── Period badge ─────────────────────────────────────────────
  function renderPeriodBadge() {
    const badge = document.getElementById('periodBadge');
    const allFour = allGrades.every(g => g.q4 !== null);

    let text, cls;
    if (allFour) {
      text = 'School year complete';
      cls  = 'green';
    } else if (activeQ === 0) {
      text = '1st quarter in progress';
      cls  = 'blue';
    } else if (activeQ === 1) {
      text = '2nd quarter in progress';
      cls  = 'amber';
    } else if (activeQ === 2) {
      text = '3rd quarter in progress';
      cls  = 'amber';
    } else {
      text = '4th quarter in progress';
      cls  = 'amber';
    }

    badge.textContent = text;
    badge.className   = 'period-badge ' + cls;
    badge.style.display = 'inline-flex';
  }

  // ── General average card ─────────────────────────────────────
  function renderAvgCard() {
    const card = document.getElementById('avgCard');
    const avgEl = document.getElementById('avgValue');
    const labelEl = document.getElementById('avgLabel');
    const remarksEl = document.getElementById('remarksGlobal');

    // Compute running average up to activeQ for each subject, then average those
    const subjectAvgs = allGrades.map(g => subjectRunningAvg(g, activeQ));
    const validAvgs   = subjectAvgs.filter(a => a !== null);

    if (validAvgs.length === 0) {
      avgEl.textContent = '—';
      avgEl.className   = 'avg-value pending';
      remarksEl.textContent = 'No grades yet';
      remarksEl.className   = 'remarks-pill pending';
    } else {
      const gen = validAvgs.reduce((a, b) => a + b, 0) / validAvgs.length;
      avgEl.textContent = Math.round(gen);

      const passed = gen >= PASS;
      avgEl.className   = 'avg-value ' + (passed ? 'pass' : 'fail');
      remarksEl.textContent = passed ? 'Passed' : 'Failed';
      remarksEl.className   = 'remarks-pill ' + (passed ? 'pass' : 'fail');
    }

    labelEl.textContent = activeQ === 3 ? 'Final average (all 4 quarters)' : Q_LABELS[activeQ] + ' grade';
    card.style.display  = 'flex';
  }

  // ── Subject list ─────────────────────────────────────────────
  function renderSubjects() {
    const list = document.getElementById('subjectList');
    list.innerHTML = '';
    list.style.display = 'flex';

    allGrades.forEach((g, idx) => {
      const card = document.createElement('div');
      card.className = 'subject-card';
      card.style.animationDelay = (idx * 40) + 'ms';

      const avg = subjectRunningAvg(g, activeQ);
      const qs  = [g.q1, g.q2, g.q3, g.q4];

      // Check if any visible quarter is failing
      const hasFail = qs.slice(0, activeQ + 1).some(v => v !== null && v < PASS);
      if (hasFail) card.classList.add('has-fail');

      // Subject average display
      let avgText, avgCls;
      if (avg === null) {
        avgText = '—';
        avgCls  = 'pending';
      } else {
        avgText = Math.round(avg);
        avgCls  = avg >= PASS ? 'pass' : 'fail';
      }

      // Quarter grade items
      const qItems = qs.map((val, qi) => {
        let valText, valCls;
        if (qi > activeQ) {
          valText = '—';
          valCls  = 'pending';
        } else if (val === null) {
          valText = '—';
          valCls  = 'pending';
        } else {
          valText = val;
          valCls  = val < PASS ? 'fail' : (qi === activeQ ? 'current' : '');
        }
        return `
          <div class="q-grade-item">
            <div class="q-grade-label">Q${qi + 1}</div>
            <div class="q-grade-value ${valCls}">${valText}</div>
          </div>`;
      }).join('');

      // Remarks pill
      let remarkText, remarkCls;
      if (avg === null) {
        remarkText = 'Pending';
        remarkCls  = 'pending';
      } else {
        remarkText = avg >= PASS ? 'Passed' : 'Failed';
        remarkCls  = avg >= PASS ? 'pass' : 'fail';
      }

      card.innerHTML = `
        <div class="subject-top">
          <div class="subject-name">${g.subject}</div>
          <div class="subject-avg ${avgCls}">${avgText}</div>
        </div>
        <div class="q-grades">${qItems}</div>
        <div class="subject-remarks">
          <span class="remarks-pill ${remarkCls}">${remarkText}</span>
        </div>`;

      list.appendChild(card);
    });
  }

  // ── Grade display per quarter ─────────────────────────────────
  // Q1, Q2, Q3 → show that quarter's grade only
  // Q4         → final average of all 4 quarters
  function subjectRunningAvg(g, upToQ) {
    const qs = [g.q1, g.q2, g.q3, g.q4];

    if (upToQ < 3) {
      return qs[upToQ] !== null ? qs[upToQ] : null;
    }

    // Q4 — final average of all 4 quarters
    const vals = qs.filter(v => v !== null);
    if (vals.length === 0) return null;
    return vals.reduce((a, b) => a + b, 0) / 4;
  }

  // ── UI helpers ───────────────────────────────────────────────
  function hideSkeleton() {
    document.getElementById('skeletonList').style.display = 'none';
  }

  function showError(msg) {
    hideSkeleton();
    const el = document.getElementById('errorWrap');
    if (msg) el.textContent = msg;
    el.style.display = 'block';
  }

  // ── Init ─────────────────────────────────────────────────────
  fetchAllGrades();
</script>

</body>
</html>
